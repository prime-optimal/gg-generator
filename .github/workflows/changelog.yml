name: changelog

on:
  push:
    branches: [main]

# Avoid overlapping release runs.
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Skip changelogen's own release commits so this never loops. (Pushes made
    # with GITHUB_TOKEN also don't re-trigger workflows, so this is belt + braces.)
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release)') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate changelog, bump version, tag + push
        run: bunx changelogen@latest --release --push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
